[pytest]
# Run from the project root: pytest tests/
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ------ markers ------
markers =
    slow: marks tests that require Milvus Lite startup (deselect with -m "not slow")

# ------ output ------
addopts = -v --tb=short
